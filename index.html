<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaidTasks - Earn with Online Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --color-bg-dark: #052e1b;
    --color-primary: #22c55e;
    --color-primary-light: #4ade80;
    --color-text-muted: #bbf7d0;
    --color-text-dim: #86efac;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at 30% 20%, #065f46 0%, #052e1b 60%, #022c22 100%);
    color:white;
    overflow:hidden;
    height:100vh;
}

.background{position:fixed;inset:0;z-index:1}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(40px);
}

.circle-1{
    width:200px;height:200px;
    background:radial-gradient(circle,rgba(34,197,94,.45),transparent 70%);
    top:100px;left:-40px;
}

.circle-2{
    width:240px;height:240px;
    background:radial-gradient(circle,rgba(74,222,128,.35),transparent 70%);
    bottom:180px;right:120px;
}

.main-content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.app-name{
    position:absolute;
    top:18%;
    left:50%;
    transform:translateX(-50%);
    font-size:34px;
    font-weight:800;
    opacity:0;
}

.icon-glow{
    position:absolute;
    width:130px;height:130px;
    background:radial-gradient(circle,rgba(34,197,94,.7),transparent 70%);
    border-radius:50%;
    filter:blur(22px);
    transform:scale(.6);
    opacity:0;
}

.icon-outer{
    width:92px;height:92px;
    background:linear-gradient(145deg,#16a34a,#22c55e);
    border-radius:26px;
    border:3px solid #4ade80;
    display:flex;
    align-items:center;
    justify-content:center;
    transform:scale(.6);
    opacity:0;
}

.tagline{
    margin-top:110px;
    font-size:17px;
    font-weight:700;
    color:#4ade80;
    opacity:0;
}

.slogan{
    margin-top:12px;
    font-size:14px;
    color:var(--color-text-muted);
    min-height:40px;
    opacity:0;
    text-align:center;
}

.loading-spinner{
    margin-top:18px;
    width:44px;height:44px;
    border:4px solid rgba(34,197,94,.25);
    border-top-color:#4ade80;
    border-radius:50%;
    animation:spin .8s linear infinite;
    opacity:0;
}

.version{
    position:absolute;
    bottom:36px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    color:var(--color-text-dim);
    opacity:0;
}

.flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    z-index:9999;
}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="background">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
</div>

<div class="flash" id="flash"></div>

<div class="main-content">
    <div class="app-name" id="appName"></div>

    <div style="position:relative">
        <div class="icon-glow" id="iconGlow"></div>
        <div class="icon-outer" id="iconOuter">✅</div>
    </div>

    <div class="tagline" id="tagline">Complete Tasks • Earn Rewards</div>
    <div class="slogan" id="slogan"></div>
    <div class="loading-spinner" id="loading"></div>
    <div class="version" id="version">PaidTasks</div>
</div>

<script>
const PLAY_LINK = "https://play.google.com/store/apps/details?id=com.survcashtompesa.pesatask";

function show(el,d=140){
 return new Promise(r=>{
  el.style.transition=`all ${d}ms ease`;
  el.style.opacity=1;
  el.style.transform="scale(1)";
  setTimeout(r,d);
 });
}

function typeFast(el,text){
 return new Promise(r=>{
  let i=0;
  const t=setInterval(()=>{
   el.textContent+=text[i++];
   if(i>=text.length){clearInterval(t);r();}
  },12); // faster typing
 });
}

async function run(){
 const appName=appNameEl=document.getElementById('appName');
 const iconGlow=document.getElementById('iconGlow');
 const iconOuter=document.getElementById('iconOuter');
 const tagline=document.getElementById('tagline');
 const slogan=document.getElementById('slogan');
 const loading=document.getElementById('loading');
 const version=document.getElementById('version');
 const flash=document.getElementById('flash');

 flash.style.opacity=.6;
 await new Promise(r=>setTimeout(r,40));
 flash.style.opacity=0;

 await typeFast(appName,"PaidTasks");
 await show(appName,120);

 await show(iconGlow,120);
 await show(iconOuter,140);
 await show(tagline,120);

 slogan.textContent="Work anytime • Quick tasks";
 await show(slogan,120);

 await show(loading,120);
 await show(version,120);

 /* FAST REDIRECT */
 setTimeout(()=>{
   flash.style.opacity=1;
   window.location.href = PLAY_LINK;
 },600);   // ↓ reduced from ~1200–2000ms
}

window.onload=run;
</script>

</body>
</html>
